<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Shelf Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --warn: #f0a84a;
    --text: #e8e8e8;
    --muted: #666;
    --green: #2d5a1b;
    --red: #5a1b1b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--muted); }

  header .store-select {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 53px);
  }

  /* LEFT PANEL */
  .left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .drop-zone {
    margin: 16px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 240, 74, 0.04);
  }

  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .drop-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-text strong {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 4px;
  }

  /* Photo queue */
  .queue-header {
    padding: 0 16px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .queue-header button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 4px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .queue-header button:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  .photo-queue {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .photo-item {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .photo-item.active { border-color: var(--accent); }
  .photo-item.done { border-color: #2a4a10; }
  .photo-item.processing { border-color: var(--warn); }
  .photo-item.error { border-color: #5a1b1b; }

  .photo-thumb {
    width: 52px;
    height: 44px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .photo-meta { flex: 1; min-width: 0; }

  .photo-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .photo-status {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    background: var(--muted);
  }

  .status-dot.done { background: var(--accent); }
  .status-dot.processing { background: var(--warn); animation: pulse 1s infinite; }
  .status-dot.error { background: #e05050; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .photo-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* RIGHT PANEL */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .right-header {
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
    letter-spacing: 0.05em;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .right-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .btn-primary:hover { background: #d4f55a; color: #000; border-color: #d4f55a; }

  /* Content area */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* Empty state */
  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
  }

  .empty-state .big { font-size: 40px; }
  .empty-state p { font-size: 12px; font-family: 'IBM Plex Mono', monospace; }

  /* Results table */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .results-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--bg);
  }

  .results-table td {
    padding: 7px 10px;
    border-bottom: 1px solid #181818;
    vertical-align: middle;
  }

  .results-table tr:hover td { background: #141414; }

  .brand-tag {
    display: inline-block;
    background: rgba(200, 240, 74, 0.1);
    color: var(--accent);
    border: 1px solid rgba(200, 240, 74, 0.2);
    border-radius: 3px;
    padding: 1px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .price-cell {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent2);
  }

  .sf-match {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .sf-match.yes { background: rgba(74, 240, 200, 0.1); color: var(--accent2); border: 1px solid rgba(74, 240, 200, 0.2); }
  .sf-match.no { background: rgba(102,102,102,0.1); color: var(--muted); border: 1px solid var(--border); }
  .sf-match.partial { background: rgba(240, 168, 74, 0.1); color: var(--warn); border: 1px solid rgba(240,168,74,0.2); }

  /* Photo view */
  .photo-analysis-view {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    height: 100%;
  }

  .photo-preview-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .photo-preview-box img {
    width: 100%;
    flex: 1;
    object-fit: contain;
    background: #080808;
    max-height: 55vh;
  }

  .analysis-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .analysis-section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .product-card .pname {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .product-card .pmeta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .insights-box {
    background: rgba(200, 240, 74, 0.04);
    border: 1px solid rgba(200, 240, 74, 0.15);
    border-radius: 6px;
    padding: 12px;
  }

  .insights-box p {
    font-size: 12px;
    line-height: 1.7;
    color: #ccc;
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, #191919 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    margin-bottom: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* CSV export area */
  .export-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }

  .export-area textarea {
    width: 100%;
    background: #080808;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 10px;
    border-radius: 4px;
    resize: vertical;
    min-height: 200px;
    line-height: 1.6;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .summary-card .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-card .lbl {
    font-size: 11px;
    color: var(--muted);
  }

  .photo-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 8px 12px;
    background: #080808;
    border-top: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .processing-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(90,27,27,0.3);
    border: 1px solid #5a1b1b;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    color: #e07070;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SF<span>/</span>SHELF·INTEL</div>
  <select class="store-select" id="storeSelect">
    <option value="Star Bazaar">Star Bazaar</option>
    <option value="DMart">DMart</option>
    <option value="Reliance Smart">Reliance Smart</option>
    <option value="Nature's Basket">Nature's Basket</option>
    <option value="Spencer's">Spencer's</option>
    <option value="More Retail">More Retail</option>
    <option value="Le Marche">Le Marche</option>
    <option value="Other">Other</option>
  </select>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="left">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="drop-icon">📷</div>
      <div class="drop-text">
        <strong>Drop shelf photos here</strong>
        tap to select · multiple photos ok<br>JPG, PNG, WEBP, HEIC
      </div>
    </div>

    <div class="queue-header">
      <span id="queueCount">0 photos</span>
      <button id="analyzeAllBtn" onclick="analyzeAll()" disabled>ANALYZE ALL</button>
    </div>

    <div class="photo-queue" id="photoQueue">
      <!-- items inserted here -->
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-header">
      <div class="tab active" onclick="switchTab('analysis')" id="tab-analysis">ANALYSIS</div>
      <div class="tab" onclick="switchTab('all-products')" id="tab-all-products">ALL PRODUCTS</div>
      <div class="tab" onclick="switchTab('export')" id="tab-export">EXPORT</div>
      <div class="right-actions">
        <button class="btn" onclick="copyCSV()">Copy CSV</button>
        <button class="btn btn-primary" onclick="downloadCSV()">↓ Download CSV</button>
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <div class="empty-state">
        <div class="big">🛒</div>
        <p>Upload shelf photos to begin analysis</p>
        <p style="color:#444; font-size:11px; margin-top:4px;">AI will extract brands, products & prices</p>
      </div>
    </div>
  </div>
</div>

<script>
const SF_PRODUCTS = [
  // Gravies
  'Red Gravy','Yellow Gravy','Misal Gravy','Korma Gravy','Pasta Gravy','White Gravy',
  'Sambar Gravy','Veg Biryani Gravy','Biryani Gravy','Tomato Makhni Gravy','Tikka Gravy',
  // Basic Pastes
  'Brown Onion Paste','Ginger Paste','Garlic Paste','Ginger Garlic Paste',
  // Tomato
  'Tomato Ketchup','Tomato Paste','Tomato Puree',
  // Sauces
  'Pizza Sauce','BBQ Sauce','Soya Sauce','Korean Sauce','Mint Sauce','Kasundi','American Mustard Sauce',
  // Chutneys
  'Mint Coriander Chutney','Tamarind Date Chutney','Coconut Chutney','Schezwan Chutney',
  'Garlic Chutney','Red Chilli Garlic Chutney','Mango Chutney','Thecha',
  // Jams
  'Mango Spread','Strawberry Spread','Pineapple Spread','Mixed Fruit Spread','Jamun Spread',
  // Mayo
  'Plain Mayonnaise','Garlic Mayonnaise','Herbs Garlic Mayonnaise',
  // Instant
  'Poha Mix','Upma Mix','Shira Mix','Tomato Soup','Corn Soup','Green Soup',
  // Sweets
  'Kaju Katli','Kesar Kaju Katli','Raisin Bites',
  // Dry Fruits
  'Peri Peri Kaju','BBQ Kaju','Cashew','Raisins','Almonds',
  // Vinegars
  'Grape Vinegar','Pomegranate Vinegar','Amla Vinegar','Raisin Vinegar',
  // Beverages
  'Orange Drink','Lemon Drink',
  // Nut Butters
  'Cashew Butter','Almond Butter','Pista Butter',
  // Marinades
  'Tandoori Marinade','Peri Peri Marinade','Afghani Marinade','Hariyali Marinade',
];

const SF_CATEGORIES = [
  'Gravies','Gravy Concentrate','Marinades','Basic Pastes','Lemon Juice','Raisin Based',
  'Jams & Spreads','Fruit Concentrate','Tomato Based','Sauces','Chutneys','Mayos & Dips',
  'Condiments','Vinegars','Broths','Fermented','Instant Premixes','Sweets',
  'Flavoured Dry Fruits','Nut Butters','Beverages','Osmotic'
];

let photos = [];   // { id, file, url, name, status, products, insights, rawText }
let allProducts = [];
let activePhotoId = null;
let currentTab = 'analysis';

// ─── File handling ───────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function addFiles(files) {
  files.forEach(file => {
    const id = Date.now() + Math.random();
    const url = URL.createObjectURL(file);
    photos.push({ id, file, url, name: file.name, status: 'pending', products: [], insights: '', rawText: '' });
  });
  renderQueue();
  document.getElementById('analyzeAllBtn').disabled = photos.length === 0;
}

function renderQueue() {
  const q = document.getElementById('photoQueue');
  q.innerHTML = '';
  document.getElementById('queueCount').textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

  photos.forEach(p => {
    const div = document.createElement('div');
    div.className = `photo-item ${p.status === 'done' ? 'done' : ''} ${p.status === 'processing' ? 'processing' : ''} ${p.status === 'error' ? 'error' : ''} ${activePhotoId === p.id ? 'active' : ''}`;
    div.onclick = () => viewPhoto(p.id);

    const count = p.products.length > 0 ? `${p.products.length} items` : '';

    div.innerHTML = `
      <img class="photo-thumb" src="${p.url}">
      <div class="photo-meta">
        <div class="photo-name">${p.name}</div>
        <div class="photo-status">
          <span class="status-dot ${p.status}"></span>
          ${p.status === 'pending' ? 'Queued' : p.status === 'processing' ? 'Analyzing…' : p.status === 'done' ? `Done · ${count}` : 'Error'}
        </div>
      </div>
      ${count ? `<div class="photo-count">${p.products.length}</div>` : ''}
    `;
    q.appendChild(div);
  });
}

// ─── Tab switching ───────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');

  if (tab === 'analysis') {
    if (activePhotoId) viewPhoto(activePhotoId);
    else showEmpty();
  } else if (tab === 'all-products') {
    renderAllProducts();
  } else if (tab === 'export') {
    renderExport();
  }
}

function showEmpty() {
  document.getElementById('contentArea').innerHTML = `
    <div class="empty-state">
      <div class="big">🛒</div>
      <p>Upload shelf photos to begin analysis</p>
      <p style="color:#444; font-size:11px; margin-top:4px;">AI will extract brands, products & prices</p>
    </div>`;
}

// ─── Analyze ────────────────────────────────────────────────────
async function analyzeAll() {
  const pending = photos.filter(p => p.status === 'pending');
  for (const p of pending) {
    await analyzePhoto(p.id);
  }
}

async function analyzePhoto(id) {
  const p = photos.find(x => x.id === id);
  if (!p || p.status === 'done') return;

  p.status = 'processing';
  renderQueue();
  viewPhoto(id);

  try {
    const base64 = await fileToBase64(p.file);
    const storeName = document.getElementById('storeSelect').value;

    const systemPrompt = `You are a retail shelf analyst helping map competitor products for Sahyadri Farms, an Indian food company. 
Analyze shelf photos from Indian modern trade stores and extract ALL visible products.

Respond ONLY with valid JSON (no markdown, no extra text):
{
  "products": [
    {
      "brand": "brand name",
      "product_name": "full product name with variant",
      "category": "category (e.g. Ketchup, Chutney, Gravy, Mayo, Jam, Sauce, Instant Mix, Sweets, Dry Fruits, Vinegar, etc.)",
      "pack_size": "size if visible (e.g. 200g, 1kg)",
      "mrp": "MRP price if visible (number only, no ₹)",
      "smart_price": "discounted/smart price if visible (number only)",
      "shelf": "shelf position: top/mid/bottom/eye-level",
      "facings": "approximate number of facings (1-10)",
      "private_label": true/false,
      "sf_overlap": "none/direct/adjacent",
      "notes": "any promo tags, out of stock, best seller tag, etc."
    }
  ],
  "shelf_insights": "2-3 sentences about what this shelf section tells us about the category competitive landscape, PL vs national brand mix, pricing trends, and SF opportunity"
}

sf_overlap values:
- "direct": SF makes this exact product
- "adjacent": SF makes something very similar or in same category  
- "none": no SF product overlap

SF products include: ketchup, tomato paste, tomato puree, gravies, ginger/garlic pastes, chutneys (schezwan, mint-coriander, tamarind-date, garlic, thecha, mango), BBQ sauce, pizza sauce, soya sauce, jams (mango, strawberry, pineapple, mixed fruit), mayonnaise (plain, garlic, herbs), instant premixes (poha, upma, shira, soups), kaju katli, flavoured cashews (peri peri, BBQ), vinegars (pomegranate, amla), orange/lemon drinks, marinades (tandoori, peri peri, afghani, hariyali), nut butters (cashew, almond).`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: p.file.type === 'image/webp' ? 'image/webp' : 'image/jpeg', data: base64 }
            },
            {
              type: 'text',
              text: `Store: ${storeName}. Extract all visible products from this shelf photo.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.[0]?.text || '';

    let parsed;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      throw new Error('AI response parse error: ' + rawText.substring(0, 100));
    }

    p.products = (parsed.products || []).map(prod => ({
      ...prod,
      store: storeName,
      photo: p.name,
      id: Date.now() + Math.random()
    }));
    p.insights = parsed.shelf_insights || '';
    p.rawText = rawText;
    p.status = 'done';

    // Merge into allProducts
    allProducts = allProducts.filter(x => x.photo !== p.name);
    allProducts.push(...p.products);

  } catch(err) {
    p.status = 'error';
    p.errorMsg = err.message;
  }

  renderQueue();
  if (currentTab === 'analysis') viewPhoto(id);
  else if (currentTab === 'all-products') renderAllProducts();
}

function viewPhoto(id) {
  activePhotoId = id;
  const p = photos.find(x => x.id === id);
  if (!p) return;

  renderQueue(); // update active state

  const area = document.getElementById('contentArea');

  if (p.status === 'processing') {
    area.innerHTML = `
      <div class="processing-overlay">
        <div class="spinner"></div>
        <p style="font-family: 'IBM Plex Mono'; font-size:12px; color: var(--muted)">Analyzing shelf…</p>
      </div>`;
    return;
  }

  if (p.status === 'error') {
    area.innerHTML = `
      <div style="padding: 20px;">
        <div class="error-msg">⚠ Analysis failed: ${p.errorMsg || 'Unknown error'}<br><br>
        <button class="btn" onclick="retryPhoto('${p.id}')">Retry</button></div>
      </div>`;
    return;
  }

  if (p.status === 'pending') {
    area.innerHTML = `
      <div class="photo-analysis-view">
        <div class="photo-preview-box">
          <img src="${p.url}">
          <div class="photo-label">${p.name}</div>
        </div>
        <div class="analysis-box">
          <div style="color: var(--muted); font-family: 'IBM Plex Mono'; font-size:12px; padding-top: 20px; text-align:center;">
            Click ANALYZE ALL or<br>right-click photo to analyze individually
          </div>
          <button class="btn btn-primary" style="margin: 0 auto;" onclick="analyzePhoto(${p.id})">ANALYZE THIS PHOTO</button>
        </div>
      </div>`;
    return;
  }

  // Done — render results
  const products = p.products;
  const sfMatches = products.filter(x => x.sf_overlap === 'direct' || x.sf_overlap === 'adjacent');

  area.innerHTML = `
    <div class="photo-analysis-view">
      <div class="photo-preview-box">
        <img src="${p.url}">
        <div class="photo-label">${p.name} · ${document.getElementById('storeSelect').value} · ${products.length} products found</div>
      </div>
      <div class="analysis-box">
        <div>
          <div class="analysis-section-title">Shelf Insights</div>
          <div class="insights-box"><p>${p.insights || 'No insights available.'}</p></div>
        </div>
        <div>
          <div class="analysis-section-title">Products Found (${products.length}) · ${sfMatches.length} SF-relevant</div>
          ${products.map(prod => `
            <div class="product-card" style="margin-bottom: 6px;">
              <div class="pmeta" style="margin-bottom:3px;">
                <span class="brand-tag">${prod.brand}</span>
                ${prod.private_label ? '<span class="tag" style="color:var(--warn); border-color:rgba(240,168,74,0.3)">PL</span>' : ''}
                <span class="sf-match ${prod.sf_overlap === 'direct' ? 'yes' : prod.sf_overlap === 'adjacent' ? 'partial' : 'no'}">
                  ${prod.sf_overlap === 'direct' ? '✓ SF Direct' : prod.sf_overlap === 'adjacent' ? '~ SF Adjacent' : '— No overlap'}
                </span>
              </div>
              <div class="pname">${prod.product_name} ${prod.pack_size ? `<span style="font-size:11px; color:var(--muted)">${prod.pack_size}</span>` : ''}</div>
              <div class="pmeta">
                <span class="tag">${prod.category}</span>
                ${prod.mrp ? `<span class="price-cell">₹${prod.mrp}</span>` : ''}
                ${prod.smart_price && prod.smart_price !== prod.mrp ? `<span style="font-family:'IBM Plex Mono'; font-size:10px; color:#e05050; text-decoration: line-through">₹${prod.mrp}</span><span class="price-cell" style="font-size:11px;"> ₹${prod.smart_price}</span>` : ''}
                <span class="tag">${prod.shelf || '?'} shelf</span>
                ${prod.facings ? `<span class="tag">${prod.facings}× facings</span>` : ''}
                ${prod.notes ? `<span class="tag" style="color:var(--warn)">${prod.notes}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function retryPhoto(id) {
  const p = photos.find(x => x.id === id);
  if (p) { p.status = 'pending'; p.errorMsg = ''; renderQueue(); viewPhoto(id); }
}

// ─── All products view ───────────────────────────────────────────
function renderAllProducts() {
  const area = document.getElementById('contentArea');
  if (allProducts.length === 0) {
    area.innerHTML = `<div class="empty-state"><p>No products analyzed yet</p></div>`;
    return;
  }

  const byCategory = {};
  allProducts.forEach(p => {
    if (!byCategory[p.category]) byCategory[p.category] = [];
    byCategory[p.category].push(p);
  });

  const sfDirect = allProducts.filter(x => x.sf_overlap === 'direct').length;
  const sfAdj = allProducts.filter(x => x.sf_overlap === 'adjacent').length;
  const brands = [...new Set(allProducts.map(x => x.brand))].length;
  const plCount = allProducts.filter(x => x.private_label).length;

  area.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card"><div class="val">${allProducts.length}</div><div class="lbl">Total Products</div></div>
      <div class="summary-card"><div class="val">${brands}</div><div class="lbl">Unique Brands</div></div>
      <div class="summary-card"><div class="val">${sfDirect}</div><div class="lbl">SF Direct Match</div></div>
      <div class="summary-card"><div class="val">${sfAdj}</div><div class="lbl">SF Adjacent</div></div>
      <div class="summary-card"><div class="val">${plCount}</div><div class="lbl">Private Label SKUs</div></div>
      <div class="summary-card"><div class="val">${Object.keys(byCategory).length}</div><div class="lbl">Categories</div></div>
    </div>

    <table class="results-table">
      <thead>
        <tr>
          <th>Brand</th>
          <th>Product</th>
          <th>Category</th>
          <th>Size</th>
          <th>MRP</th>
          <th>Smart Price</th>
          <th>Shelf</th>
          <th>Facings</th>
          <th>PL</th>
          <th>SF Match</th>
          <th>Photo</th>
          <th>Store</th>
        </tr>
      </thead>
      <tbody>
        ${allProducts.map(p => `
          <tr>
            <td><span class="brand-tag">${p.brand}</span></td>
            <td>${p.product_name}</td>
            <td><span class="tag">${p.category}</span></td>
            <td style="color:var(--muted); font-family:'IBM Plex Mono'; font-size:11px">${p.pack_size || '—'}</td>
            <td class="price-cell">${p.mrp ? '₹'+p.mrp : '—'}</td>
            <td class="price-cell" style="color: ${p.smart_price && p.smart_price < p.mrp ? '#e05050' : 'var(--accent2)'}">${p.smart_price ? '₹'+p.smart_price : '—'}</td>
            <td><span class="tag">${p.shelf || '—'}</span></td>
            <td style="font-family:'IBM Plex Mono'; font-size:11px; text-align:center">${p.facings || '—'}</td>
            <td style="text-align:center">${p.private_label ? '✓' : ''}</td>
            <td><span class="sf-match ${p.sf_overlap === 'direct' ? 'yes' : p.sf_overlap === 'adjacent' ? 'partial' : 'no'}">${p.sf_overlap || 'none'}</span></td>
            <td style="font-family:'IBM Plex Mono'; font-size:9px; color:var(--muted); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${p.photo}</td>
            <td style="font-family:'IBM Plex Mono'; font-size:10px; color:var(--muted)">${p.store}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ─── Export ──────────────────────────────────────────────────────
function buildCSV() {
  const headers = ['Store','Brand','Product Name','Category','Pack Size','MRP','Smart Price','Shelf Position','Facings','Private Label','SF Overlap','Notes','Photo Source'];
  const rows = allProducts.map(p => [
    p.store, p.brand, p.product_name, p.category, p.pack_size || '', p.mrp || '', p.smart_price || '',
    p.shelf || '', p.facings || '', p.private_label ? 'Yes' : 'No', p.sf_overlap, p.notes || '', p.photo
  ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
  return [headers.join(','), ...rows].join('\n');
}

function renderExport() {
  const csv = buildCSV();
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <div class="export-area">
      <div class="analysis-section-title" style="margin-bottom:10px">CSV DATA · ${allProducts.length} rows</div>
      <textarea readonly>${csv}</textarea>
      <div style="margin-top: 10px; display:flex; gap:8px;">
        <button class="btn" onclick="copyCSV()">Copy to Clipboard</button>
        <button class="btn btn-primary" onclick="downloadCSV()">Download CSV</button>
      </div>
    </div>`;
}

function copyCSV() {
  navigator.clipboard.writeText(buildCSV()).then(() => alert('CSV copied to clipboard!'));
}

function downloadCSV() {
  const csv = buildCSV();
  const store = document.getElementById('storeSelect').value.replace(/\s/g,'_');
  const date = new Date().toISOString().slice(0,10);
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `SF_ShelfStudy_${store}_${date}.csv`;
  a.click();
}

// ─── Utility ─────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}
</script>
